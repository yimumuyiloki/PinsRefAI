name: 自动部署 PinsRefAI

on:
  push:
    branches: ["main"] # 只有代码推送到 main 时才触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages  # 关键点：必须手动加上这两行
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 安装 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. 安装依赖 (包含 Google SDK)
        run: npm install

      - name: 4. 打包项目 (生成 dist 文件夹)
        run: npm run build

      - name: 5. 配置 Pages
        uses: actions/configure-pages@v4

      - name: 6. 上传打包后的文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 确保这里和 Vite 生成的文件夹一致

      - name: 7. 正式发布
        id: deployment    # 增加这个 id
        uses: actions/deploy-pages@v4
